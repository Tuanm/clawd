services:
  clawd:
    image: ghcr.io/Tuanm/clawd:latest
    build: .
    ports:
      - "3456:3456"
    volumes:
      - clawd-data:/home/clawd/.clawd
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    # SYS_ADMIN required for bwrap (Claude Code sandbox): CLONE_NEWUSER needs
    # CAP_SYS_ADMIN inside Docker to create Linux user namespaces for isolation.
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped

volumes:
  clawd-data:
