services:
  clawd:
    build: .
    container_name: clawd
    env_file:
      - path: .env
        required: false
    ports:
      - "3456:3456"
    volumes:
      - clawd-data:/home/clawd/.clawd
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    restart: unless-stopped

volumes:
  clawd-data:
