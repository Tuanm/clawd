appId: com.clawd.app
productName: "Claw'd"
copyright: Copyright © 2025 Claw'd Pilot

directories:
  output: release
  buildResources: build

files:
  - dist/electron/**/*
  - "!node_modules/**/*"

extraResources:
  # The compiled Bun server binary + UI assets
  - from: dist/server/
    to: server/
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  darkModeSupport: true
  hardenedRuntime: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  maintainer: clawd-pilot

