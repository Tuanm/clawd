appId: com.clawd.app
productName: "Claw'd"
copyright: Copyright © 2025 Claw'd Pilot

directories:
  output: release
  buildResources: build

files:
  - dist/electron/**/*
  - "!node_modules/**/*"

extraResources:
  # The compiled Bun server binary + UI assets
  - from: dist/server/
    to: server/
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  target:
    - target: zip
      arch:
        - arm64
        - x64
  darkModeSupport: true
  hardenedRuntime: false
  identity: null

win:
  target:
    - target: portable
      arch:
        - x64
  requestedExecutionLevel: asInvoker

portable:
  artifactName: "${productName}-${version}-portable.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  maintainer: clawd-pilot
  artifactName: "${productName}-${version}.${ext}"

appImage:
  artifactName: "${productName}-${version}.${ext}"




