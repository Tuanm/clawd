<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97853"/>
      <stop offset="100%" style="stop-color:#b85a3a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Claw'd body (simplified crab/spider) -->
  <g transform="translate(256, 240)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="70" ry="55" fill="white"/>
    <!-- Eyes -->
    <circle cx="-22" cy="-15" r="12" fill="#D97853"/>
    <circle cx="22" cy="-15" r="12" fill="#D97853"/>
    <circle cx="-22" cy="-15" r="6" fill="#1a1a2e"/>
    <circle cx="22" cy="-15" r="6" fill="#1a1a2e"/>
    <!-- Legs left -->
    <rect x="-110" y="-20" width="45" height="10" rx="5" fill="white" transform="rotate(-20, -70, -20)"/>
    <rect x="-115" y="10" width="45" height="10" rx="5" fill="white" transform="rotate(10, -70, 10)"/>
    <rect x="-105" y="35" width="45" height="10" rx="5" fill="white" transform="rotate(30, -70, 35)"/>
    <!-- Legs right -->
    <rect x="65" y="-20" width="45" height="10" rx="5" fill="white" transform="rotate(20, 70, -20)"/>
    <rect x="70" y="10" width="45" height="10" rx="5" fill="white" transform="rotate(-10, 70, 10)"/>
    <rect x="60" y="35" width="45" height="10" rx="5" fill="white" transform="rotate(-30, 70, 35)"/>
  </g>
</svg>
