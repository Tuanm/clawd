<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- FOUC prevention: apply stored theme before first paint -->
    <script>
      (function() {
        var stored = localStorage.getItem("clawd-theme");
        var t = (stored === "light" || stored === "dark") ? stored : "light";
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.classList.add("no-transition");
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            document.documentElement.classList.remove("no-transition");
          });
        });
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#f9f7f3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Claw'd" />
    <link rel="icon" type="image/svg+xml" href="/clawd.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Claw'd</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
