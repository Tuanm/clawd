<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: hsl(60 2.6% 7.6%);
      background: hsl(48 33.3% 97.1%);
      line-height: 1.5;
    }
    h1 {
      font-size: 15px;
      font-weight: 900;
      color: hsl(15 63.1% 59.6%);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid hsl(60 2.6% 7.6% / 12%);
      background: hsl(60 2.6% 7.6% / 3%);
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: hsl(150 50% 35%); }
    .dot.disconnected { background: hsl(0 60% 50%); }
    .status-text {
      flex: 1;
      font-size: 13px;
      color: hsl(60 2.6% 7.6% / 70%);
    }
    label {
      display: block;
      font-size: 11px;
      color: hsl(60 2.6% 7.6% / 50%);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid hsl(60 2.6% 7.6% / 12%);
      border-radius: 8px;
      background: hsl(60 2.6% 7.6% / 3%);
      color: hsl(60 2.6% 7.6%);
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: hsl(15 63.1% 59.6%);
    }
    input::placeholder {
      color: hsl(60 2.6% 7.6% / 30%);
    }
    button {
      width: 100%;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: hsl(15 63.1% 59.6%);
      color: #fff;
      font-family: "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: hsl(15 63.1% 45%); }
    .ext-id {
      font-size: 11px;
      color: hsl(60 2.6% 7.6% / 40%);
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1><img src="../icons/icon48.png" alt="Claw'd" /> Claw'd Browser Bridge</h1>

  <div class="status">
    <div class="dot disconnected" id="dot"></div>
    <span class="status-text" id="statusText">Connecting...</span>
  </div>

  <label>Server URL</label>
  <input type="text" id="serverUrl" placeholder="ws://localhost:3456/browser/ws" />

  <button id="connectBtn">Reconnect</button>

  <div class="ext-id" id="extId"></div>

  <script src="popup.js"></script>
</body>
</html>
