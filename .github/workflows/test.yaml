name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run tests (isolated)
        run: bun test --isolate
      - name: Build UI
        run: bun run build:ui
      - name: Build server
        run: bun run build:server
