name: Build & Push Workspace Docker Images

on:
  push:
    branches: [main, feat/agent-workspace]
    paths:
      - 'packages/workspace-mcp/**'
      - 'Dockerfile'
      - 'Dockerfile.web3'
  schedule:
    - cron: '0 4 1 * *'   # Monthly security rebuilds
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/clawd-pilot/clawd/workspace

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t clawd-workspace:base \
            -f Dockerfile \
            .

      - name: Test base image
        run: |
          docker run -d --name ws-test \
            -p 127.0.0.1:13000:3000 \
            clawd-workspace:base

          # Poll healthcheck instead of fixed sleep (up to 90s)
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ws-test 2>/dev/null || echo "unknown")
            [ "$STATUS" = "healthy" ] && echo "Container healthy!" && break
            [ $i -eq 30 ] && echo "Container failed to become healthy" && docker logs ws-test && exit 1
            sleep 3
          done

          curl -sf http://localhost:13000/health
          echo "Health check passed"

          # Verify tools/list returns 19 tools
          TOOL_COUNT=$(curl -sf -X POST http://localhost:13000/ \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['result']['tools']))")
          echo "Tools registered: $TOOL_COUNT"
          [ "$TOOL_COUNT" = "19" ] || (echo "Expected 19 tools, got $TOOL_COUNT" && exit 1)

          docker stop ws-test && docker rm ws-test

      - name: Build web3 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t clawd-workspace:web3 \
            -f Dockerfile.web3 \
            .

      - name: Push images (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag clawd-workspace:base ${{ env.BASE_IMAGE }}:base
          docker tag clawd-workspace:web3 ${{ env.BASE_IMAGE }}:web3
          docker tag clawd-workspace:base ${{ env.BASE_IMAGE }}:latest
          docker push ${{ env.BASE_IMAGE }}:base
          docker push ${{ env.BASE_IMAGE }}:web3
          docker push ${{ env.BASE_IMAGE }}:latest
