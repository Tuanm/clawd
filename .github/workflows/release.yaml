name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build UI + embed assets
        run: |
          bun run build:ui
          bun run build:embed

      - name: Compile all platforms
        run: |
          mkdir -p dist
          bun run compile:linux-x64
          bun run compile:linux-arm64
          bun run compile:darwin-arm64
          bun run compile:darwin-x64
          bun run compile:windows-x64

      - name: Package release artifacts
        run: |
          cd dist
          tar czf clawd-linux-x64.tar.gz clawd-linux-x64
          tar czf clawd-linux-arm64.tar.gz clawd-linux-arm64
          tar czf clawd-darwin-arm64.tar.gz clawd-darwin-arm64
          tar czf clawd-darwin-x64.tar.gz clawd-darwin-x64
          zip clawd-windows-x64.zip clawd-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/clawd-linux-x64.tar.gz
            dist/clawd-linux-arm64.tar.gz
            dist/clawd-darwin-arm64.tar.gz
            dist/clawd-darwin-x64.tar.gz
            dist/clawd-windows-x64.zip
